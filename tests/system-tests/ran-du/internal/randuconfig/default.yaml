---
# System Tests RAN DU default configurations.
randu_test_workload:
    namespace: 'test'
    create_method: 'shell'
    create_shell_cmd: '/opt/vdu-workload-emulator/add_test-deployments.sh'
    delete_shell_cmd: '/opt/vdu-workload-emulator/delete_test-deployments.sh'
launch_workload_iterations: 5
soft_reboot_iterations: 5
hard_reboot_iterations: 5
reboot_recovery_time: 2

stability_no_workload_duration_mins: 30
stability_no_workload_interval_mins: 5
stability_workload_duration_mins: 30
stability_workload_interval_mins: 5
stability_output_path: "/tmp/reports"
stability_policies_check: true

ptp_enabled: true

# PTP 3 WPC Case 06 (iperf throughput): set ptp_iperf3_server to enable; optional ptp_iperf3_client_bind for -B.
ptp_iperf3_server: ""
ptp_iperf3_client_bind: ""
ptp_iperf3_duration_sec: 300
# Optional wait (seconds) before Case 06/07 for stable lock; production often uses 1800+.
ptp_locked_state_wait_sec: 0
# Case 07 tc netem device; leave empty to skip Case 07 unless set (e.g. ens1f0).
ptp_netem_interface: ""
# Case 01/02: comma-separated PHC ifaces with s2 (e.g. ens1f0,ens2f0,ens3f0); empty = infer from linuxptp logs.
ptp_wpc_sync_interfaces: ""
# Optional; when empty defaults to last name in ptp_wpc_sync_interfaces (or inferred list).
ptp_wpc_primary_interface: ""

# BMC credentials map for tests requiring BMC access (e.g., NMIKernelCrashKdump).
# Format for env var ECO_RANDU_NODES_CREDENTIALS_MAP: "node1,user,pass,https://bmc:443;node2,user,pass,https://bmc2:443"
# Tests requiring BMC will be skipped if this is empty.
randu_nodes_bmc_map: {}
